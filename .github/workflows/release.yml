name: Release
# Nota: este workflow não depende mais do global.json — o Dockerfile usa
# a imagem mcr.microsoft.com/dotnet/sdk:10.0-preview diretamente.

# Dispara ao receber uma tag começando com "v" (ex.: v1.0.0, v1.2.3).
# Builda as imagens Docker, pusha pro GitHub Container Registry com
# duas tags (a versão em si e "latest"), e publica uma GitHub Release
# apontando para o CHANGELOG.
on:
  push:
    tags:
      - 'v*.*.*'

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: ${{ github.repository_owner }}

permissions:
  contents: write       # criar o GitHub Release
  packages: write       # pushar no GHCR

jobs:
  build-and-push:
    name: Build & push Docker images
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - name: Derive version from tag
        id: meta
        run: |
          TAG="${GITHUB_REF_NAME}"     # ex.: v1.0.0
          VERSION="${TAG#v}"           # 1.0.0
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.api
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/erplus-api:${{ steps.meta.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/erplus-api:latest
          cache-from: type=gha,scope=api
          cache-to: type=gha,mode=max,scope=api

      - name: Build & push Client image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.client
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/erplus-client:${{ steps.meta.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/erplus-client:latest
          cache-from: type=gha,scope=client
          cache-to: type=gha,mode=max,scope=client

  github-release:
    name: Publish GitHub Release
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract release notes from CHANGELOG
        id: notes
        run: |
          # Pega o conteúdo do primeiro bloco "## [x.y.z]" do CHANGELOG.md,
          # até o próximo "## [". Se não achar, usa um fallback curto.
          VERSION="${{ needs.build-and-push.outputs.version }}"
          awk -v ver="$VERSION" '
            /^## \[/ {
              if (inblock) exit
              if ($0 ~ "\\[" ver "\\]") { inblock=1; next }
            }
            inblock { print }
          ' CHANGELOG.md > release-notes.md
          if [ ! -s release-notes.md ]; then
            echo "Release $VERSION. Veja o CHANGELOG.md no repositório." > release-notes.md
          fi
          {
            echo ""
            echo "## Imagens Docker"
            echo ""
            echo "\`\`\`bash"
            echo "docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/erplus-api:$VERSION"
            echo "docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/erplus-client:$VERSION"
            echo "\`\`\`"
          } >> release-notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ERPlus ${{ github.ref_name }}
          body_path: release-notes.md
          draft: false
          prerelease: false

# =============================================================================
# ERPlus — Publish Docker images
# =============================================================================
# Dispara em TODO push para main. Builda as 3 imagens (API, Client, Migrations)
# e empurra pro GitHub Container Registry com duas tags:
#
#   :latest              — ponteiro que o Deploy Production consome
#   :sha-<short-sha>     — imutável, serve pra rollback ("pin 7 chars do sha"
#                          no docker-compose, `docker compose up -d` e pronto)
#
# Fluxo de deploy vira:
#   1. Mergeia PR em main  →  este workflow publica automaticamente
#   2. Clica "Deploy Production" no Actions  →  pulla :latest e rola os
#      containers (com migrations gated)
#
# Sem tag. Sem CHANGELOG obrigatório. Sem GitHub Release.
# =============================================================================

name: Publish

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: ${{ github.repository_owner }}

permissions:
  contents: read
  packages: write       # push no GHCR

concurrency:
  # Se dois PRs mergearem em sequência, o segundo cancela o primeiro —
  # só o estado final de main interessa.
  group: publish-main
  cancel-in-progress: true

jobs:
  build-and-push:
    name: Build & push Docker images
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Compute short SHA
        id: meta
        run: |
          echo "sha_short=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.api
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/erplus-api:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/erplus-api:sha-${{ steps.meta.outputs.sha_short }}
          cache-from: type=gha,scope=api
          cache-to: type=gha,mode=max,scope=api

      - name: Build & push Client image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.client
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/erplus-client:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/erplus-client:sha-${{ steps.meta.outputs.sha_short }}
          cache-from: type=gha,scope=client
          cache-to: type=gha,mode=max,scope=client

      - name: Build & push Migrations image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.migrations
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/erplus-migrations:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/erplus-migrations:sha-${{ steps.meta.outputs.sha_short }}
          cache-from: type=gha,scope=migrations
          cache-to: type=gha,mode=max,scope=migrations

      - name: Summary
        run: |
          {
            echo "## Imagens publicadas"
            echo ""
            echo "| Imagem | Tags |"
            echo "|---|---|"
            echo "| \`erplus-api\` | \`:latest\`, \`:sha-${{ steps.meta.outputs.sha_short }}\` |"
            echo "| \`erplus-client\` | \`:latest\`, \`:sha-${{ steps.meta.outputs.sha_short }}\` |"
            echo "| \`erplus-migrations\` | \`:latest\`, \`:sha-${{ steps.meta.outputs.sha_short }}\` |"
            echo ""
            echo "Pronto pra rodar **Deploy Production**."
          } >> "$GITHUB_STEP_SUMMARY"

name: ERPlus CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '22'

jobs:
  backend:
    name: Backend (.NET)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore src/API/ERPlus.API.csproj

      - name: Build
        run: dotnet build src/API/ERPlus.API.csproj --no-restore --configuration Release

      - name: Publish
        run: dotnet publish src/API/ERPlus.API.csproj --no-build --configuration Release --output ./publish

  frontend:
    name: Frontend (React)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install
        working-directory: client
        run: npm ci

      - name: Build
        working-directory: client
        run: npm run build

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Build API image
        run: docker build -f docker/Dockerfile.api -t erplus-api:${{ github.sha }} .

      - name: Build Client image
        run: docker build -f docker/Dockerfile.client -t erplus-client:${{ github.sha }} .

      - name: Build Migrations image
        run: docker build -f docker/Dockerfile.migrations -t erplus-migrations:${{ github.sha }} .
